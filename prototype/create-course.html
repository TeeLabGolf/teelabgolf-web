<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>New Course — TeeLab AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="shared.js?v=2"></script>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <button class="header-back" onclick="location.href='create-tee-time.html'">←</button>
    <div class="header-title">New Course</div>
    <div class="header-back invisible"></div>
  </div>

  <!-- Form -->
  <div class="form-page">

    <!-- Course Name -->
    <div class="form-group">
      <label class="form-label">Course Name</label>
      <input type="text" class="form-input" value="Riviera Country Club" placeholder="Course name">
    </div>

    <!-- Address -->
    <div class="form-group">
      <label class="form-label">Address</label>
      <input type="text" class="form-input" placeholder="City, State or full address">
    </div>

    <!-- Holes -->
    <div class="form-group">
      <label class="form-label">Holes</label>
      <div class="hole-count-toggle">
        <button class="hole-count-btn active" id="btn18" onclick="setHoleCount(18)">18 Holes</button>
        <button class="hole-count-btn" id="btn9" onclick="setHoleCount(9)">9 Holes</button>
      </div>
    </div>

    <!-- Par Grid -->
    <div class="form-group">
      <label class="form-label">Par per Hole</label>
      <div class="hole-par-grid" id="holeParGrid"></div>
    </div>

    <!-- Total Par -->
    <div class="total-par-display">
      <div class="total-par-label">Total Par</div>
      <div class="total-par-value" id="totalParValue">72</div>
    </div>

    <!-- Tee Labels -->
    <div class="form-group">
      <label class="form-label">Tee Labels</label>
      <div id="teeLabelsContainer" style="display:flex; flex-wrap:wrap; gap:var(--space-sm); align-items:center;">
        <span class="tee-label-chip" style="display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:var(--radius-full); border:2px solid var(--gray-200); background:#fff; font-size:13px; font-weight:600; color:var(--gray-700);">
          <span style="width:12px; height:12px; border-radius:50%; background:#4B8AE8;"></span>Blue
        </span>
        <span class="tee-label-chip" style="display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:var(--radius-full); border:2px solid var(--gray-200); background:#fff; font-size:13px; font-weight:600; color:var(--gray-700);">
          <span style="width:12px; height:12px; border-radius:50%; background:#fff; border:2px solid var(--gray-300);"></span>White
        </span>
        <span class="tee-label-chip" style="display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:var(--radius-full); border:2px solid var(--gray-200); background:#fff; font-size:13px; font-weight:600; color:var(--gray-700);">
          <span style="width:12px; height:12px; border-radius:50%; background:#D43D3D;"></span>Red
        </span>
        <button onclick="showToast('Add tee feature coming soon')" style="display:inline-flex; align-items:center; gap:4px; padding:8px 14px; border-radius:var(--radius-full); border:1.5px dashed var(--green-300); background:var(--green-50); font-size:13px; font-weight:600; color:var(--green-600); cursor:pointer; font-family:var(--font-body);">+ Add Tee</button>
      </div>
    </div>

    <!-- Submit -->
    <button class="btn-primary" onclick="showToast('Course submitted for approval!'); setTimeout(() => navigate('create-tee-time'), 400);" style="margin-top:var(--space-lg);">Submit Course</button>

    <p style="text-align:center; font-size:12px; color:var(--gray-400); margin-top:var(--space-lg); padding-bottom:var(--space-xl);">Course will be available after platform admin approval</p>

  </div>

</div>

<script>
let courseHoleCount = 18;
let holePars = [4,4,3,4,5,4,4,3,5, 4,4,3,4,5,4,4,3,5];

function setHoleCount(count) {
  courseHoleCount = count;
  document.getElementById('btn18').classList.toggle('active', count === 18);
  document.getElementById('btn9').classList.toggle('active', count === 9);

  if (count === 9) {
    holePars = holePars.slice(0, 9);
  } else {
    while (holePars.length < 18) {
      holePars.push(4);
    }
  }

  renderHoleParGrid();
  updateTotalPar();
}

function renderHoleParGrid() {
  const grid = document.getElementById('holeParGrid');
  let html = '';
  for (let i = 0; i < courseHoleCount; i++) {
    const par = holePars[i];
    const parClass = par === 3 ? 'par-3' : (par === 5 ? 'par-5' : '');
    html += '<div class="hole-par-item ' + parClass + '" onclick="cyclePar(' + i + ')">';
    html += '<div class="hole-num">HOLE ' + (i + 1) + '</div>';
    html += '<div class="hole-par-value">' + par + '</div>';
    html += '</div>';
  }
  grid.innerHTML = html;
}

function cyclePar(index) {
  const current = holePars[index];
  if (current === 3) holePars[index] = 4;
  else if (current === 4) holePars[index] = 5;
  else holePars[index] = 3;

  renderHoleParGrid();
  updateTotalPar();
}

function updateTotalPar() {
  const total = holePars.reduce((sum, p) => sum + p, 0);
  document.getElementById('totalParValue').textContent = total;
}

// Init
renderHoleParGrid();
updateTotalPar();
</script>
</body>
</html>
